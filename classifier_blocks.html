<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Анализатор эфиров — DeepSeek API</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #ff0000; border-bottom: 3px solid #ff0000; padding-bottom: 10px; }
        .upload-section, .api-section { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .upload-box { border: 2px dashed #ccc; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; }
        .upload-box:hover { border-color: #ff0000; background: #fff5f5; }
        input, button { padding: 10px 15px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; }
        button { background: #ff0000; color: white; border: none; cursor: pointer; margin-top: 10px; }
        button:hover { background: #cc0000; }
        .api-key-input { width: 100%; padding: 8px; margin: 10px 0; font-family: monospace; }
        .result { background: white; border-radius: 12px; padding: 20px; margin-top: 20px; }
        .block { border-left: 4px solid #ff0000; margin-bottom: 15px; padding: 12px; background: #fafafa; }
        .fact { border-left-color: #4caf50; background: #e8f5e9; }
        .opinion { border-left-color: #ff9800; background: #fff3e0; }
        .noise { border-left-color: #9e9e9e; background: #f5f5f5; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .badge-fact { background: #4caf50; color: white; }
        .badge-opinion { background: #ff9800; color: white; }
        .badge-noise { background: #9e9e9e; color: white; }
        .stats { background: #f0f0f0; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .guest-card { display: inline-block; background: #fafafa; padding: 10px 15px; margin: 5px; border-radius: 8px; border-left: 4px solid; }
        .progress-bar { width: 100%; height: 20px; background: #e0e0e0; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: #ff0000; width: 0%; }
        .info { background: #e3f2fd; padding: 10px; border-radius: 8px; font-size: 13px; margin-top: 10px; }
        textarea { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎙️ Анализатор эфиров — DeepSeek API</h1>
    
    <div class="api-section">
        <label>🔑 API ключ DeepSeek (получить на platform.deepseek.com)</label>
        <input type="password" id="apiKey" class="api-key-input" placeholder="sk-...">
        <div class="info">💡 Ключ нужен для анализа. Бесплатный приветственный кредит $5. После расходования — пополнение.</div>
    </div>
    
    <div class="upload-section">
        <div class="upload-box" id="uploadArea">
            <h3>📄 Загрузите расшифровку (.txt)</h3>
            <p>Поддерживаются форматы: 2:27:42, 14:07, 2 минуты 15 секунд</p>
        </div>
        <input type="file" id="fileInput" accept=".txt" style="display: none;">
        <div id="status" style="margin-top: 10px; font-size: 12px;"></div>
        <button id="analyzeBtn" disabled>🔍 Анализировать (разбить на блоки + DeepSeek)</button>
    </div>
    
    <div id="result" style="display: none;"></div>
</div>

<script>
// ============================================================
// ПАРСИНГ ВРЕМЕННЫХ МЕТОК (как в smart_parser)
// ============================================================
function parseTimeToSeconds(timeStr) {
    timeStr = timeStr.trim();
    let match = timeStr.match(/(\d+)\s*минут\w*\s+(\d+)\s*секунд/);
    if (match) return parseInt(match[1]) * 60 + parseInt(match[2]);
    match = timeStr.match(/^(\d+):(\d+):(\d+)$/);
    if (match) return parseInt(match[1]) * 3600 + parseInt(match[2]) * 60 + parseInt(match[3]);
    match = timeStr.match(/^(\d+):(\d+)$/);
    if (match) return parseInt(match[1]) * 60 + parseInt(match[2]);
    return null;
}

function formatTime(seconds) {
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

function isTimestamp(line) {
    line = line.trim();
    return line.match(/^\d+\s*минут/) || line.match(/^\d+:\d+/) || line.match(/^\d+:\d+:\d+/);
}

function parseTranscript(text) {
    const lines = text.split('\n');
    const subtitles = [];
    for (let i = 0; i < lines.length; i++) {
        let line = lines[i].trim();
        if (!line) continue;
        if (isTimestamp(line)) {
            const timeSec = parseTimeToSeconds(line);
            if (timeSec !== null) {
                let j = i + 1;
                let content = '';
                while (j < lines.length) {
                    let nextLine = lines[j].trim();
                    if (!nextLine) { j++; continue; }
                    if (isTimestamp(nextLine)) break;
                    content += (content ? ' ' : '') + nextLine;
                    j++;
                }
                if (content) {
                    subtitles.push({
                        time: timeSec,
                        timeStr: formatTime(timeSec),
                        text: content
                    });
                }
                i = j - 1;
            }
        }
    }
    return subtitles;
}

// Определение гостя (универсально по фразе "с нами на связи")
function detectGuest(text, prevGuest) {
    const lower = text.toLowerCase();
    // Ищем "с нами на связи" + имя
    const match = lower.match(/с нами на связи\s+([а-яё\s]+?)(?:,|\.|$)/i);
    if (match) {
        let name = match[1].trim();
        // Очищаем от лишних слов
        name = name.replace(/^(писатель|журналист|эпидемиолог|иронист|доктор|главный редактор)\s*/i, '');
        name = name.split(' ').slice(0, 2).join(' ');
        if (name && name.length > 2) {
            return { name: name, detected: true };
        }
    }
    return { name: prevGuest || 'Ведущие', detected: false };
}

// Объединение фраз в блоки по гостям
function mergeIntoBlocks(subtitles) {
    const blocks = [];
    let currentBlock = { guest: null, guestName: 'Ведущие', start: null, end: null, texts: [] };
    
    for (let i = 0; i < subtitles.length; i++) {
        const item = subtitles[i];
        const guestInfo = detectGuest(item.text, currentBlock.guestName);
        const guestName = guestInfo.name;
        
        if (!currentBlock.guest) {
            currentBlock = { guest: guestName, guestName: guestName, start: item.timeStr, end: item.timeStr, texts: [item.text] };
        } else if (currentBlock.guestName === guestName && !guestInfo.detected) {
            currentBlock.end = item.timeStr;
            currentBlock.texts.push(item.text);
        } else {
            blocks.push({ ...currentBlock, fullText: currentBlock.texts.join(' ') });
            currentBlock = { guest: guestName, guestName: guestName, start: item.timeStr, end: item.timeStr, texts: [item.text] };
        }
    }
    
    if (currentBlock.texts.length > 0) {
        blocks.push({ ...currentBlock, fullText: currentBlock.texts.join(' ') });
    }
    
    return blocks;
}

// Классификация через DeepSeek
async function classifyWithDeepSeek(text, apiKey) {
    const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
        method: 'POST',
        headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            model: 'deepseek-chat',
            messages: [{
                role: 'system',
                content: 'Ты — анализатор речи. Классифицируй высказывание строго в один из трех типов: ФАКТ, ОЦЕНКА, ШУМ. Отвечай только одним словом.'
            }, {
                role: 'user',
                content: `Классифицируй: "${text.substring(0, 4000)}"`
            }]
        })
    });
    
    if (!response.ok) {
        throw new Error(`API error: ${response.status}`);
    }
    
    const data = await response.json();
    let result = data.choices[0].message.content.trim().toUpperCase();
    
    if (result === 'ФАКТ' || result === 'ОЦЕНКА' || result === 'ШУМ') {
        return result;
    }
    return 'ОЦЕНКА';
}

// ============================================================
// ОСНОВНАЯ ЛОГИКА
// ============================================================
let parsedBlocks = [];

document.getElementById('uploadArea').onclick = () => document.getElementById('fileInput').click();

document.getElementById('fileInput').onchange = (e) => {
    const file = e.target.files[0];
    if (!file || !file.name.endsWith('.txt')) {
        alert('Загрузите файл .txt');
        return;
    }
    const reader = new FileReader();
    reader.onload = (ev) => {
        const subtitles = parseTranscript(ev.target.result);
        parsedBlocks = mergeIntoBlocks(subtitles);
        document.getElementById('status').innerHTML = `✅ ${file.name} — ${parsedBlocks.length} смысловых блоков`;
        document.getElementById('analyzeBtn').disabled = false;
    };
    reader.readAsText(file, 'UTF-8');
};

document.getElementById('analyzeBtn').onclick = async () => {
    if (parsedBlocks.length === 0) {
        alert('Сначала загрузите расшифровку');
        return;
    }
    
    const apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey || !apiKey.startsWith('sk-')) {
        alert('Введите корректный API ключ DeepSeek');
        return;
    }
    
    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;
    document.getElementById('result').style.display = 'block';
    document.getElementById('result').innerHTML = '<div class="loading">🔍 Анализируем блоки...</div>';
    
    // Прогресс-бар
    const progressHtml = `<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div><div id="progressText" style="text-align: center;"></div>`;
    document.getElementById('result').innerHTML = progressHtml;
    
    try {
        const results = [];
        const total = parsedBlocks.length;
        
        for (let i = 0; i < total; i++) {
            const block = parsedBlocks[i];
            const percent = Math.round((i / total) * 100);
            document.getElementById('progressFill').style.width = `${percent}%`;
            document.getElementById('progressText').innerHTML = `Блок ${i+1}/${total}: ${block.guestName} (${percent}%)`;
            
            try {
                const type = await classifyWithDeepSeek(block.fullText, apiKey);
                results.push({ ...block, type });
            } catch (err) {
                console.error(err);
                results.push({ ...block, type: 'ШУМ' });
            }
            
            await new Promise(r => setTimeout(r, 300));
        }
        
        // Статистика по гостям
        const guestStats = {};
        results.forEach(r => {
            if (!guestStats[r.guestName]) guestStats[r.guestName] = { fact: 0, opinion: 0, noise: 0, total: 0 };
            guestStats[r.guestName][r.type === 'ФАКТ' ? 'fact' : (r.type === 'ОЦЕНКА' ? 'opinion' : 'noise')]++;
            guestStats[r.guestName].total++;
        });
        
        // Формируем отчёт
        let html = `<div class="result">
            <h2>📊 Результаты анализа</h2>
            <div class="stats">
                <strong>${results.length}</strong> смысловых блоков<br>
            </div>
            <h3>👥 Коэффициенты доверия по экспертам</h3>
            <div>`;
        
        for (const [guest, stats] of Object.entries(guestStats)) {
            const factPercent = Math.round(stats.fact / stats.total * 100);
            const opinionPercent = Math.round(stats.opinion / stats.total * 100);
            const trust = (stats.fact / stats.total).toFixed(2);
            html += `
                <div class="guest-card" style="border-left-color: ${factPercent > 50 ? '#4caf50' : '#ff9800'}">
                    <strong>${guest}</strong><br>
                    📊 Факты: ${stats.fact} (${factPercent}%)<br>
                    💬 Оценки: ${stats.opinion} (${opinionPercent}%)<br>
                    🔇 Шум: ${stats.noise}<br>
                    🎯 Коэффициент доверия: <strong>${trust}</strong>
                </div>
            `;
        }
        
        html += `</div><h3>📋 Детальная классификация блоков</h3>`;
        
        results.forEach(block => {
            const typeClass = block.type === 'ФАКТ' ? 'fact' : (block.type === 'ОЦЕНКА' ? 'opinion' : 'noise');
            const typeBadge = block.type === 'ФАКТ' ? 'badge-fact' : (block.type === 'ОЦЕНКА' ? 'badge-opinion' : 'badge-noise');
            html += `
                <div class="block ${typeClass}">
                    <h3>
                        ${block.guestName} · ${block.start} — ${block.end}
                        <span class="badge ${typeBadge}">${block.type}</span>
                    </h3>
                    <div style="font-size: 12px; color: #666; max-height: 150px; overflow-y: auto;">
                        ${escapeHtml(block.fullText.substring(0, 400))}${block.fullText.length > 400 ? '...' : ''}
                    </div>
                </div>
            `;
        });
        
        html += `<div class="info">
            💡 <strong>Как это работает:</strong><br>
            • Расшифровка разбивается на блоки по гостям (автоопределение по фразе "с нами на связи")<br>
            • Каждый блок отправляется в DeepSeek API с вашим ключом<br>
            • Результат: ФАКТ (проверяемое утверждение), ОЦЕНКА (мнение), ШУМ (связки)<br>
            • Коэффициент доверия = доля фактов в речи эксперта
        </div></div>`;
        
        document.getElementById('result').innerHTML = html;
        
    } catch (error) {
        document.getElementById('result').innerHTML = `<div class="error" style="color: red; padding: 20px;">❌ Ошибка: ${error.message}</div>`;
    } finally {
        btn.disabled = false;
    }
};

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
</body>
</html>
